<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VisaGuide AI · 통합 워크플로우 허브</title>
<style>
  :root{ --bg:#0f1420; --panel:#18202f; --line:#2b3648; --text:#e6edf3; --muted:#93a1b5;
    --accent:#4f9dff; --ok:#3fb950; --warn:#d29922; --idle:#3a455a; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--text); font-size:14px; line-height:1.5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif; }
  header{ padding:13px 22px; border-bottom:1px solid var(--line); display:flex; align-items:center;
    gap:10px; flex-wrap:wrap; background:linear-gradient(180deg,#131a28,#0f1420); }
  header .title{ font-size:17px; font-weight:800; }
  .badge{ font-size:11px; color:var(--muted); border:1px solid var(--line); padding:2px 8px; border-radius:999px; }
  .pill{ font-size:12px; padding:3px 10px; border-radius:999px; border:1px solid var(--line); color:var(--muted); }
  .pill.on{ color:var(--ok); border-color:var(--ok); }
  .wrap{ padding:18px 22px; max-width:1320px; margin:0 auto; }
  .hint{ color:var(--muted); font-size:12.5px; margin:0 0 14px; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(330px,1fr)); gap:14px; }
  .card{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px 16px;
    transition:border-color .2s, box-shadow .2s; }
  .card.running{ border-color:var(--accent); box-shadow:0 0 0 2px rgba(79,157,255,.18), 0 6px 20px rgba(0,0,0,.35); }
  .card.done{ border-color:var(--ok); }
  .card .top{ display:flex; align-items:center; gap:8px; }
  .card .ttl{ font-weight:800; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card .st{ margin-left:auto; font-size:11px; padding:2px 9px; border-radius:999px; border:1px solid var(--idle); color:var(--muted); white-space:nowrap; }
  .card.running .st{ color:var(--accent); border-color:var(--accent); }
  .card.done .st{ color:var(--ok); border-color:var(--ok); }
  .card .msg{ color:var(--muted); font-size:12px; margin:7px 0 10px; min-height:17px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .nowline{ display:flex; align-items:center; gap:9px; background:#121a28; border:1px solid var(--line);
    border-radius:9px; padding:8px 10px; }
  .nowline .dot{ width:10px; height:10px; border-radius:50%; background:var(--idle); flex:none; }
  .card.running .nowline .dot{ background:var(--accent); animation:pulse 1s infinite; }
  .card.done .nowline .dot{ background:var(--ok); }
  @keyframes pulse{ 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.7);opacity:.6;} }
  .nowline .nm{ font-weight:700; font-size:13px; }
  .nowline .ic{ font-size:15px; }
  .meta{ display:flex; gap:12px; margin:10px 0 12px; font-size:11.5px; color:var(--muted); flex-wrap:wrap; }
  .meta b{ color:var(--text); font-weight:700; }
  .card a.detail{ display:inline-block; width:100%; text-align:center; text-decoration:none;
    background:#1e2740; color:#cfe0ff; border:1px solid #2a3550; border-radius:9px; padding:8px 0; font-weight:700; font-size:12.5px; }
  .card a.detail:hover{ border-color:var(--accent); color:#fff; }
  .empty{ color:var(--muted); border:1px dashed var(--line); border-radius:12px; padding:26px; text-align:center; }
  /* 진행 단계 미니 바(간단한 동작만; 상세는 링크) */
  .bar{ height:5px; border-radius:999px; background:#101725; overflow:hidden; margin-bottom:11px; }
  .bar > i{ display:block; height:100%; width:0; background:linear-gradient(90deg,#4f9dff,#3fb950); transition:width .4s; }
</style>
</head>
<body>
<header>
  <span class="title">🛰️ 통합 워크플로우 허브</span>
  <span class="badge">모든 대화 세션의 병렬 실행을 한눈에</span>
  <span id="livePill" class="pill">⚪ 연결 대기</span>
  <span id="cnt" class="badge">세션 0</span>
</header>
<div class="wrap">
  <p class="hint">💡 각 카드는 세션의 실행을 <b>간단한 동작</b>으로만 보여줍니다.
    자세한 데이터 흐름·노드 상세는 카드의 <b>상세 트레이스</b> 링크(<code>/{session_id}/trace</code>)에서 확인하세요.</p>
  <div id="grid" class="grid"></div>
  <div id="empty" class="empty">아직 실행된 세션이 없습니다. 고객 화면(:8000/)에서 질문하면 여기에 실시간으로 나타납니다.</div>
</div>
<script>
var API_BASE=(window.__API_BASE__||'http://localhost:8000').replace(/\/+$/,'');
const $=(id)=>document.getElementById(id);
const esc=(s)=>String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
// 토폴로지 노드 총수(진행 바 근사용). 6~8개 사이라 8 기준으로 근사.
const APPROX_TOTAL = 6;
const SESS = {};   // session_id -> state

function render(){
  const ids = Object.keys(SESS);
  $("cnt").textContent = "세션 " + ids.length;
  $("empty").style.display = ids.length ? "none" : "";
  // 최근 실행 우선
  ids.sort((a,b)=> (SESS[b].run_id||"").localeCompare(SESS[a].run_id||""));
  const g=$("grid");
  g.innerHTML = ids.map(id=>{
    const s=SESS[id];
    const cls = s.status==="running" ? "running" : (s.status==="done" ? "done" : "");
    const pct = Math.min(100, Math.round((s.nodeCount/APPROX_TOTAL)*100));
    const stTxt = s.status==="running" ? "● 실행 중" : (s.status==="done" ? "✓ 완료"+(s.total_ms?` · ${s.total_ms}ms`:"") : "대기");
    return `<div class="card ${cls}">
      <div class="top">
        <span class="ttl" title="${esc(s.title)}">${esc(s.title||id)}</span>
        <span class="st">${esc(stTxt)}</span>
      </div>
      <div class="msg" title="${esc(s.message)}">${esc(s.message||"—")}</div>
      <div class="bar"><i style="width:${s.status==="done"?100:pct}%"></i></div>
      <div class="nowline">
        <span class="dot"></span><span class="ic">${esc(s.icon||"⏳")}</span>
        <span class="nm">${esc(s.node||"대기 중")}</span>
      </div>
      <div class="meta"><span>노드 <b>${s.nodeCount}</b>개</span><span>세션 <b>${esc(id)}</b></span></div>
      <a class="detail" href="/${encodeURIComponent(id)}/trace">상세 트레이스 ↗</a>
    </div>`;
  }).join("");
}

function bootstrap(s){
  SESS[s.session_id] = {
    title:s.title, message:s.message, status:s.status,
    node:s.current_node, icon:s.node_icon, nodeCount:s.node_count||0,
    total_ms:s.total_ms, run_id:s.run_id,
  };
}

function handle(evt){
  if(evt.type==="connected"){ $("livePill").textContent="🟢 연결됨"; $("livePill").className="pill on"; return; }
  const id=evt.session_id; if(!id) return;
  let s=SESS[id];
  if(evt.type==="start"){
    s = SESS[id] = { title:evt.session_title||id, message:evt.message||"", status:"running",
      node:"시작", icon:"▶️", nodeCount:0, total_ms:null, run_id:evt.run_id };
  } else if(!s){ return; }
  if(evt.type==="node"){ s.status="running"; s.node=evt.label; s.icon=evt.icon; s.nodeCount=evt.step||s.nodeCount+1; }
  else if(evt.type==="done"){ s.status="done"; s.node="응답 완료"; s.icon="🏁"; s.total_ms=evt.total_ms; }
  else if(evt.type==="error"){ s.status="done"; s.node="오류"; s.icon="⚠️"; }
  render();
}

async function init(){
  try{
    const r=await fetch(API_BASE+"/trace/sessions"); const d=await r.json();
    (d.sessions||[]).forEach(bootstrap); render();
  }catch(_){}
  const es=new EventSource(API_BASE+"/trace/live");   // 세션 필터 없음 → 전체 수신
  es.onmessage=(m)=>{ try{ handle(JSON.parse(m.data)); }catch(_){} };
  es.onerror=()=>{ $("livePill").textContent="🟡 재연결 중…"; $("livePill").className="pill"; };
}
init();
</script>
</body>
</html>
