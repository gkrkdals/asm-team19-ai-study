services:
  vectordb:
    image: chromadb/chroma:latest
    ports:
      - "8002:8000"
    volumes:
      - chroma_data:/chroma/.chroma
    environment:
      - IS_PERSISTENT=TRUE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CHROMA_HOST=vectordb
      - CHROMA_PORT=8000
      - DATA_PATH=/app/data/visas
    volumes:
      - ./data:/app/data:ro
    depends_on:
      vectordb:
        condition: service_healthy
    # 고객 UI = http://localhost:8000/ (FastAPI 가 서빙하는 SPA: api/static/app.html)

volumes:
  chroma_data:
